<!doctype html>
<body>
<section>
    <h2>Envie uma mensagem</h2>
    <form action="#">

        <p>Brasil vai ser campeão?</p>
        <input type="radio" id="sim" name="brasil">
        <label for="Sim">Sim</label>
        <input type="radio" id="não" name="brasil">
        <label for="nao">Não</label>
        <br>

        <!-- caixas de seleçao -->
         <p>Selecione as favoritas da seleção de 2026:</p>

         <input type="checkbox" id="Brasil" name="Brasil" value="Brasil">
         <label for="Brasil">Brasil</label>

         <input type="checkbox" id="frança" name="frança" value="frança">
         <label for="Franca">frança</label>

         <input type="checkbox" id="Alemanha" name="Alemanha" value="Alemanha">
         <label for="Alemanha">Alemanha</label>

         <input type="checkbox" id="Japão" name="Japão" value="Japão">
         <label for="Japão">Japão</label><br>

        <!-- textos menores -->
        <label for="nome">nome completo: </label><br>
        <input type="text" id= "nome" name="nome"><br>

        <!-- senhas -->
         <label for="senha:">Senha</label><br>
         <input type="senha"><br>

        <!-- Textos longos -->
        <label for="mensagem">mensagem:</label><br>
        <textarea name="mensagem" id="mensagem" rows="5"></textarea><br>

        <!-- escolhas -->
        <label for="linguagens">linguagem web preferida: </label><br>
        <select name="linguagens" id="linguagens">
        <option value="html">HTML</option>
        <option value="css">CSS</option>
        <option value="javascript">JAVASCRIPT</option>
        <option value="pthon">PYTHON</option>
        <option value="c++">C++</option>
        <option value="ruby">RUBY</option>
        <option value="javas">JAVA</option>
        <option value="nenhuma">NENHUMA</option>
        </select>
        <br>

        <!-- Botões -->
        <button>Enviar</button>
        
    </form>
</section>
</body>
